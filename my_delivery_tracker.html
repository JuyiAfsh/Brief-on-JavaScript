<!DOCTYPE html>
<html>
    <head>
        <title>My Delivery Tracker</title>
        <style>
            body {
                font-family: serif;
                background: seashell;
                text-align: center;
                padding: 20;

            }
            h1 { color: lightseagreen;}
            button {
                background: lightseagreen;
                color: wheat;
                padding: 15px 20px;
                border: none;
                border-radius: 25px;
                cursor: pointer;
                margin: 5px;
            }
            div {
                border: 2px solid lightseagreen;
                width: 250px;
                margin: 5px auto;
                padding: 6px 15px;
                text-align: left;
                border-radius: 7px;
            }
        </style>
    </head>
    <body>

        <h1>My Delivery Tracker</h1>
        <button onclick="saveOrder()">Save Order</button>
        <button onclick="startDelivery()">Start Delivery</button>

        <div>JSON Text: <span id="json-text"></span></div>
        <div>Load Item: <span id="loaded-item"></span></div>
        <div>Loaded Price: <span id="loaded-price"></span></div>
        <div>Status: <span id="status"></span></div>
        <div>Result: <span id="result"></span></div>

        <script>
            let order = {
                item:  "Pizza",
                price: 5,
                shop:  "My Snack Shop"
            };

            function saveOrder() {
                let jsonText   = JSON.stringify(order);
                let loadedOrder  = JSON.parse(jsonText);

                document.getElementById("json-text").innerHTML   = jsonText;
                document.getElementById("loaded-item").innerHTML = loadedOrder.item;
                document.getElementById("loaded-price").innerHTML = "$" + loadedOrder.price;
            }

            function delay(ms) {
                return new Promise(function(resolve) {
                    setTimeout(resolve, ms);
                })
            }

            async function startDelivery() {
                document.getElementById("result").innerHTML = "";

                document.getElementById("status").innerHTML = "Order recieved!";
                setTimeout(function() {
                    document.getElementById("staus").innerHTML = "Kitchen is preparing...";
                }, 1000);

                await delay(3000);
                document.getElementById("status").innerHTML = "Out for delivery!";

                await delay(2000);
                document.getElementById("result").innerHTML = "Your order has arrived!";
            }

        </script>
    </body>
</html>
