<!DOCTYPE html>
<html>

<head>
    <title>Digital Clock</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #ClockDisplay {
            color: lightpink;
            font-weight: bold;
            font-size: 35px;
            border: 2px solid white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px lightpink;
        }

        #ClockDisplay:hover {
            box-shadow: inset 0 0 20px lightpink ;
        }
    </style>
</head>

<body>
    <div id="ClockDisplay" onload="showTime()"></div>
    <script>
        function showTime() {
            var date = new Date();
            var h = date.getHours()
            var m = date.getMinutes()
            var s = date.getSeconds()

            if (h > 12) {
                h = h - 12;
                session = "PM";
            }

            h = h < 10 ? "0" + h : h;
            m = m < 10 ? "0" + m : m;
            s = s < 10 ? "0" + s : s;

            var time = h + ":" + m + ":" + s + " " + session;
            document.getElementById("ClockDisplay").innerHTML = time;
            setTimeout(showTime, 1000);
        }

        showTime();
    </script>
</body>
</html>
