<!DOCTYPE html>
<html>
    <head>
        <title>My Planet Cards</title>
        <style>
            body {
                font-family: Arial;
                background: white;
                padding: 25px;
                text-align: center;
            }
            h1 { color: blue;}
            p { color: grey;}
            .cards {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 25px;
            }
            .card {
                background: wheat;
                border: 5px solid darkblue;
                border-radius: 10px;
                padding: 15px;
                width: 200px;
            }
            .planet-name {
                font-size: 20px;
                font-weight: bold;
                color: black;
            }
            .planet-fact {
                color: grey;
                margin-top: 15px;
                font-size: 15px;
            }
            button {
                background: blueviolet;
                color: white;
                border: none;
                padding: 12px 30px;
                border-radius: 10px;
                cursor: pointer;
                font-size: 15px;
                margin-top: 10px;
            }
        </style>
    </head>
    <body>
        <h1>My Planet Cards</h1>
        <p>Use a JavaScript class to build planet cards!</p>
        <button onclick="showPlanets()">Show Planets!</button>
        <div class="cards">
            <div id="card1"></div>
            <div id="card2"></div>
            <div id="card3"></div>
        </div>
        <script>
            class Planet {
                constructor(name, fact) {
                    this.name = name;
                    this.fact = fact;
                }
                describe() {
                    return this.name + ":" + this.fact;
                }
            }

            function showPlanets() {
                let p1 = new Planet("Earth", "The only planet with life");
                let p2 = new Planet("Mars", "Known as the Red Planet");
                let p3 = new Planet("Saturn", "Has rings made of ice");

                document.getElementById("card1").innerHTML = "<div class='card'><div class='planet-name'>" + p1.name + "</div>" + "<div class='planet-fact'>" + p1.describe() + "</div></div>";
                document.getElementById("card2").innerHTML = "<div class='card'><div class='planet-name'>" + p2.name + "</div>" + "<div class='planet-fact'>" + p2.describe() + "</div></div>";
                document.getElementById("card3").innerHTML = "<div class='card'><div class='planet-name'>" + p3.name + "</div>" + "<div class='planet-fact'>" + p3.describe() + "</div></div>";
            }
        </script>
    </body>
</html>
